<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner ISBN (bibliothèque)</title>
  <!-- QuaggaJS (version stable qui marche sur GitHub Pages) -->
  <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
</head>
<body>
  <div style="width:100%; max-width:400px; margin:auto;">
    <!-- Caméra arrière -->
    <video id="scanner" autoplay muted playsinline style="width:100%; height:auto; border:2px solid #ccc;"></video>
  </div>
  <pre id="result" style="text-align:center;">🔍 En attente de la caméra…</pre>
  <button id="stop" style="display:none; margin-top:10px;">Arrêter</button>

  <script>
    const video = document.getElementById("scanner");
    const resultEl = document.getElementById("result");
    const stopBtn = document.getElementById("stop");
    let timeoutId = null;
    let scanned = false;

    function startScan() {
      resultEl.textContent = "Initialisation…";

      Quagga.init(
        {
          inputStream: {
            name: "Live",
            type: "LiveStream",
            target: video,   // <video> comme cible
            constraints: {
              facingMode: { exact: "environment" }  // caméra arrière uniquement
            }
          },
          decoder: {
            readers: ["ean_reader", "code_128_reader"]  // ISBN / EAN-13 / Code 128
          }
        },
        function (err) {
          if (err) {
            console.error("Quagga.init ERROR:", err);
            resultEl.textContent = "❌ Erreur caméra : voir console Safari.";
            return;
          }

          console.log("Quagga prêt, démarrage…");
          Quagga.start();
          resultEl.textContent = "📸 Caméra arrière active… (max 8 s)";

          // Timer 8 s si rien n’est détecté
          timeoutId = setTimeout(() => {
            if (!scanned) {
              resultEl.textContent = "⚠️ Aucun code détecté (ou caméra pas stable).";
              Quagga.stop();
              stopBtn.style.display = "none";
            }
          }, 8000);

          stopBtn.style.display = "block";
          stopBtn.onclick = () => {
            resultEl.textContent = "🛑 Scan arrêté.";
            Quagga.stop();
            clearTimeout(timeoutId);
            stopBtn.style.display = "none";
          };

          Quagga.onDetected(function (data) {
            if (!scanned) {
              scanned = true;
              const isbn = data.codeResult.code;
              resultEl.textContent = `✅ ISBN lu : ${isbn}`;
              console.log("ISBN:", isbn);

              // Rediriger vers ta bibliothèque GitHub Pages
              setTimeout(() => {
                window.location.href = `https://ton-pseudo.github.io/mon-repo/?isbn=${isbn}`;
              }, 1000);
              Quagga.stop();
              clearTimeout(timeoutId);
              stopBtn.style.display = "none";
            }
          });
        }
      );
    }

    // Démarrer au clic ou au chargement
    document.addEventListener("click", () => {
      if (!Quagga.isRunning() && !scanned) {
        startScan();
      }
    });

    // Démarrer automatiquement
    startScan();
  </script>
</body>
</html>
