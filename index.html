<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner ISBN (rapide)</title>
  <script src="https://cdn.jsdelivr.net/npm/quagga2@latest/dist/quagga.min.js"></script>
</head>
<body>
  <div id="scanner-container" style="width:100%; max-width:400px; margin:auto;">
    <video id="scanner" autoplay muted playsinline style="width:100%;"></video>
  </div>
  <pre id="result" style="text-align:center;">En attente (max 8 s)...</pre>

  <button id="stop" style="margin-top:10px; display:none;">
    Arrêter maintenant
  </button>

  <script>
    const video = document.getElementById("scanner");
    const resultEl = document.getElementById("result");
    const stopBtn = document.getElementById("stop");
    let timeoutId = null;

    // Démarrer le scanner
    function startScan() {
      Quagga.init(
        {
          inputStream: {
            name: "Live",
            type: "LiveStream",
            target: video,
            constraints: {
              width: 1280,
              height: 720,
              facingMode: "environment",
            },
          },
          decoder: {
            readers: ["ean_reader", "code_128_reader"],
          },
        },
        function (err) {
          if (err) {
            console.error(err);
            resultEl.textContent = "Erreur d'init.";
            return;
          }
          Quagga.start();
          // Drapeau pour éviter de loguer plusieurs fois
          let scanned = false;

          // Timer de 8 secondes max
          timeoutId = setTimeout(() => {
            if (!scanned) {
              resultEl.textContent = "Aucun code détecté. Relancez.";
              Quagga.stop();
              stopBtn.style.display = "none";
            }
          }, 8000);

          stopBtn.style.display = "block";
          stopBtn.onclick = () => {
            resultEl.textContent = "Scan interrompu.";
            Quagga.stop();
            clearTimeout(timeoutId);
            stopBtn.style.display = "none";
          };

          Quagga.onDetected((data) => {
            if (!scanned) {
              scanned = true;
              const isbn = data.codeResult.code;
              resultEl.textContent = `ISBN lu : ${isbn}`;
              // Option 1 : renvoyer vers ta bibliothèque
              setTimeout(() => {
                window.location.href = `https://ton-pseudo.github.io/mon-repo/?isbn=${isbn}`;
              }, 1000);
              // Option 2 : envoyer via API
              // fetch("/api/add-book", { method: "POST", body: JSON.stringify({ isbn }) });
              Quagga.stop();
              clearTimeout(timeoutId);
              stopBtn.style.display = "none";
            }
          });
        }
      );
    }

    // Redémarrer le scan si besoin
    document.addEventListener("click", () => {
      if (!Quagga.isRunning()) {
        startScan();
      }
    });

    // Démarrer au chargement
    startScan();
  </script>
</body>
</html>
