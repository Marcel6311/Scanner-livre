<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test caméra arrière uniquement</title>
</head>
<body>
  <video id="scanner" autoplay muted playsinline style="width:100%; height:240px; border:2px solid #ccc;"></video>
  <div id="status"></div>

  <script>
    const video = document.getElementById("scanner");
    const status = document.getElementById("status");

    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ 
        video: { 
          facingMode: "environment" 
        } 
      })
        .then(function (stream) {
          video.srcObject = stream;
          status.textContent = "✅ Caméra arrière OK";
        })
        .catch(function (err) {
          console.error("getUserMedia ERROR", err);
          status.textContent = "❌ Erreur caméra arrière : " + err.name;
        });
    } else {
      status.textContent = "getUserMedia non supporté.";
    }
  </script>
</body>
</html>
