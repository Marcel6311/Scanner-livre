
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner ISBN (rapide, iOS)</title>
  <!-- Quagga2 -->
  <script src="https://cdn.jsdelivr.net/npm/quagga2@latest/dist/quagga.min.js"></script>
</head>
<body>
  <div style="width:100%; max-width:400px; margin:auto;">
    <video id="scanner" autoplay muted playsinline style="width:100%; height:auto;border:2px solid #ccc;"></video>
  </div>
  <pre id="result" style="text-align:center;">En attente de la caméra...</pre>
  <button id="stop" style="display:none;margin-top:10px;">Arrêter</button>

  <script>
    const video = document.getElementById("scanner");
    const resultEl = document.getElementById("result");
    const stopBtn = document.getElementById("stop");
    let timeoutId = null;
    let scanned = false;

    function startScan() {
      resultEl.textContent = "Initialisation… (max 8 s)";

      Quagga.init(
        {
          inputStream: {
            name: "Live",
            type: "LiveStream",
            target: video,
            constraints: {
              width: { ideal: 1280 },
              height: { ideal: 1080 },
              facingMode: "environment",
            },
          },
          decoder: {
            readers: ["ean_reader", "code_128_reader"],
          },
        },
        function (err) {
          if (err) {
            console.error("Quagga.init ERROR:", err);
            resultEl.textContent = "Erreur caméra : voir console Safari.";
            return;
          }

          console.log("Quagga prêt, démarrage…");
          Quagga.start();
          resultEl.textContent = "Appareil photo en cours de démarrage…";

          // Timer 8 s max
          timeoutId = setTimeout(() => {
            if (!scanned) {
              resultEl.textContent = "Aucun code détecté (ou caméra pas prête).";
              Quagga.stop();
              stopBtn.style.display = "none";
            }
          }, 8000);

          stopBtn.style.display = "block";
          stopBtn.onclick = () => {
            resultEl.textContent = "Scan arrêté.";
            Quagga.stop();
            clearTimeout(timeoutId);
            stopBtn.style.display = "none";
          };

          Quagga.onDetected(function (data) {
            if (!scanned) {
              scanned = true;
              const isbn = data.codeResult.code;
              resultEl.textContent = `ISBN lu : ${isbn}`;
              console.log("ISBN:", isbn);

              // Rediriger vers ta bibliothèque (GitHub Pages)
              setTimeout(() => {
                window.location.href = `https://ton-pseudo.github.io/mon-repo/?isbn=${isbn}`;
              }, 1000);

              Quagga.stop();
              clearTimeout(timeoutId);
              stopBtn.style.display = "none";
            }
          });
        }
      );
    }

    // Démarrer au clic OU au chargement
    document.addEventListener("click", () => {
      if (!Quagga.isRunning() && !scanned) {
        startScan();
      }
    });

    // Démarrer automatiquement au chargement
    startScan();
  </script>
</body>
</html>
