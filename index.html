<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scanner ISBN (simple et rapide)</title>
  <!-- QuaggaJS (version stable) -->
  <script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      background: #f0f0f0;
    }
    #container {
      max-width: 400px;
      margin: 0 auto;
      text-align: center;
    }
    #scanner {
      width: 100%;
      height: 240px;
      border: 3px solid #2c3e50;
      border-radius: 8px;
      background: #000;
      outline: 3px solid #27ae60; /* tu vois que la vidéo existe */
    }
    #result {
      margin: 10px 0;
      font-size: 16px;
      color: #333;
    }
  </style>
</head>
<body>
  <div id="container">
    <h2>Scanner d’ISBN</h2>
    <video id="scanner" autoplay muted playsinline></video>
    <div id="result">En attente...</div>
  </div>

  <script>
    const video      = document.getElementById("scanner");
    const resultEl   = document.getElementById("result");

    // 🔍 Fais d'abord marcher le flux vidéo (ton code actuel OK)
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
      navigator.mediaDevices.getUserMedia({ 
        video: { 
          facingMode: "environment" 
        } 
      })
        .then(function (stream) {
          video.srcObject = stream;
          resultEl.textContent = "📸 Caméra prêt. Place un ISBN dans le cadre.";
        })
        .catch(function (err) {
          console.error("getUserMedia ERROR", err);
          resultEl.textContent = "❌ Erreur caméra : " + err.name;
        });
    } else {
      resultEl.textContent = "getUserMedia non supporté.";
    }

    // ⚡ Ensuite, lance Quagga
    resultEl.textContent = "Init scanner...";

    Quagga.init(
      {
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: video,           // la même <video>
          constraints: {
            facingMode: "environment"  // caméra arrière
          }
        },
        decoder: {
          readers: ["ean_reader", "code_128_reader"]  // ISBN / EAN13 / Code128
        }
      },
      function (err) {
        if (err) {
          console.error("Quagga.init ERROR:", err);
          resultEl.textContent = "❌ Erreur Quagga.";
          return;
        }

        console.log("Quagga prêt");
        Quagga.start();
        resultEl.textContent = "🔍 Pointez un ISBN...";

        // Quand un code est détecté
        Quagga.onDetected(function (data) {
          const isbn = data.codeResult.code;
          resultEl.textContent = `✅ ISBN lu : ${isbn}`;
          console.log("ISBN:", isbn);

          // 🔗 Redirige vers ta bibliothèque GitHub Pages
          setTimeout(() => {
            window.location.href = `https://ton-pseudo.github.io/mon-repo/?isbn=${isbn}`;
          }, 1500);

          Quagga.stop();
        });
      }
    );
  </script>
</body>
</html>
