<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
  <title>Scanner Livres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #131313;
      --surface2: #1a1a1a;
      --border: #242424;
      --border2: #2e2e2e;
      --accent: #00e87a;
      --accent-glow: rgba(0, 232, 122, 0.18);
      --amber: #ffb700;
      --red: #ff3b3b;
      --text: #f2f2f2;
      --text2: #999;
      --text3: #555;
      --mono: 'IBM Plex Mono', monospace;
      --ui: 'Barlow Condensed', sans-serif;
      --circumference: 150.796px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--ui);
      display: flex;
      flex-direction: column;
    }

    /* ─── HEADER ─────────────────────────────────────────── */
    .hd {
      flex-shrink: 0;
      padding: env(safe-area-inset-top, 12px) 18px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hd-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hd-title { font-size: 24px; font-weight: 900; letter-spacing: .04em; text-transform: uppercase; line-height: 1; }
    .hd-sub { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--text3); margin-top: 2px; }

    /* ─── ISBN BANNER (permanent) ───────────────────────── */
    .isbn-bar {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .isbn-tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: .16em;
      color: var(--text3);
      text-transform: uppercase;
      white-space: nowrap;
    }
    .isbn-led {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0;
      transition: background .3s, box-shadow .3s;
    }
    .isbn-led.on { background: var(--accent); box-shadow: 0 0 7px var(--accent); animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    .isbn-val {
      font-family: var(--mono);
      font-size: 19px;
      font-weight: 700;
      letter-spacing: .12em;
      color: var(--accent);
      flex: 1;
      transition: color .3s;
    }
    .isbn-val.empty { color: var(--border2); }

    /* ─── SCROLLABLE BODY ───────────────────────────────── */
    .body {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      display: flex;
      flex-direction: column;
    }

    /* ─── VIEWPORT ──────────────────────────────────────── */
    #vwrap {
      display: none;
      position: relative;
      width: 100%;
      background: #000;
      flex-shrink: 0;
    }
    #viewport { width: 100%; position: relative; }
    #viewport video { width: 100%; display: block; max-height: 42vh; object-fit: cover; }
    #viewport canvas.drawingBuffer { display: none !important; }

    /* overlay */
    .ov { position: absolute; inset: 0; pointer-events: none; }
    .corner {
      position: absolute; width: 22px; height: 22px;
      border-color: var(--accent); border-style: solid;
    }
    .c-tl { top: 15%; left: 8%; border-width: 2px 0 0 2px; }
    .c-tr { top: 15%; right: 8%; border-width: 2px 2px 0 0; }
    .c-bl { bottom: 15%; left: 8%; border-width: 0 0 2px 2px; }
    .c-br { bottom: 15%; right: 8%; border-width: 0 2px 2px 0; }
    .scan-beam {
      position: absolute; left: 8%; right: 8%; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--accent) 40%, var(--accent) 60%, transparent 100%);
      box-shadow: 0 0 10px var(--accent), 0 0 20px var(--accent-glow);
      animation: beam 2s ease-in-out infinite;
      top: 20%;
    }
    @keyframes beam { 0%,100%{top:20%} 50%{top:80%} }
    .scan-beam.paused { animation-play-state: paused; }

    /* timer ring */
    .timer-wrap {
      position: absolute; top: 10px; right: 10px;
      width: 54px; height: 54px;
    }
    .timer-wrap svg { transform: rotate(-90deg); }
    .t-track { fill: none; stroke: rgba(255,255,255,.12); stroke-width: 3; }
    .t-prog {
      fill: none; stroke: var(--accent); stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 150.796;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke .3s;
    }
    .t-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 17px; font-weight: 700;
      color: var(--text);
    }

    /* ─── IDLE ILLUSTRATION ─────────────────────────────── */
    #idle {
      padding: 36px 20px 16px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      opacity: .45;
    }
    .idle-txt { font-size: 12px; letter-spacing: .1em; color: var(--text3); }

    /* ─── CONTROLS ──────────────────────────────────────── */
    .ctrl {
      flex-shrink: 0;
      padding: 14px 16px;
      display: flex; gap: 10px;
    }
    .btn {
      border: none; cursor: pointer;
      font-family: var(--ui); font-weight: 700; font-size: 16px;
      letter-spacing: .07em; text-transform: uppercase;
      border-radius: 12px; padding: 16px 20px;
      transition: transform .15s, opacity .15s;
    }
    .btn:active { transform: scale(.96); opacity: .85; }
    .btn-primary { flex: 1; background: var(--accent); color: #000; }
    .btn-cancel {
      background: var(--red); color: #fff;
      display: none;
    }

    .status {
      flex-shrink: 0;
      text-align: center;
      padding: 4px 20px 14px;
      font-size: 13px; letter-spacing: .05em;
      min-height: 32px;
    }
    .status.scanning { color: var(--accent); }
    .status.timeout  { color: var(--amber); }
    .status.muted    { color: var(--text3); }

    /* ─── LOADER ────────────────────────────────────────── */
    #loader {
      display: none;
      padding: 28px; text-align: center;
      flex-direction: column; align-items: center; gap: 14px;
    }
    .spinner {
      width: 38px; height: 38px;
      border: 3px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-txt { font-size: 12px; letter-spacing: .1em; color: var(--text3); }

    /* ─── RESULT CARD ───────────────────────────────────── */
    #result {
      display: none;
      margin: 4px 14px 14px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 14px;
      overflow: hidden;
    }
    .r-top {
      display: flex; gap: 14px; padding: 16px;
    }
    .r-cover {
      width: 78px; height: 108px;
      object-fit: cover; border-radius: 6px; flex-shrink: 0;
      background: var(--border);
    }
    .r-cover-ph {
      width: 78px; height: 108px; flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      display: none; align-items: center; justify-content: center;
    }
    .r-info { flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0; }
    .r-title {
      font-size: 17px; font-weight: 700; line-height: 1.2;
      color: var(--text);
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .r-author { font-size: 14px; color: var(--accent); font-weight: 600; }
    .r-meta { font-size: 11px; font-family: var(--mono); color: var(--text3); margin-top: auto; }
    .r-src {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 9px; letter-spacing: .1em; text-transform: uppercase;
      color: var(--text3);
      background: var(--surface2);
      padding: 3px 8px; border-radius: 20px; border: 1px solid var(--border);
      margin-top: 4px;
    }
    .r-src-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); }

    .r-div { height: 1px; background: var(--border); margin: 0; }

    .r-summary {
      padding: 13px 16px;
      font-size: 13px; line-height: 1.65; color: #aaa;
    }
    .r-summary.collapsed { max-height: 76px; overflow: hidden; }
    .r-more {
      padding: 6px 16px 12px;
      font-size: 12px; color: var(--accent);
      cursor: pointer; letter-spacing: .04em;
    }

    .r-actions { padding: 0 14px 14px; display: flex; gap: 10px; }
    .btn-add {
      flex: 1;
      background: var(--accent); color: #000;
      border: none; border-radius: 10px;
      font-family: var(--ui); font-size: 15px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      padding: 14px 10px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: transform .15s, background .3s;
    }
    .btn-add:active { transform: scale(.96); }
    .btn-add.done { background: var(--border2); color: var(--text3); }
    .btn-again {
      padding: 14px 16px;
      background: transparent; color: var(--text);
      border: 1px solid var(--border2); border-radius: 10px;
      font-family: var(--ui); font-size: 18px; font-weight: 700;
      cursor: pointer;
      transition: transform .15s;
    }
    .btn-again:active { transform: scale(.96); }

    /* ─── ERROR ──────────────────────────────────────────── */
    #errcard {
      display: none;
      margin: 4px 14px 14px;
      background: rgba(255,59,59,.08);
      border: 1px solid rgba(255,59,59,.25);
      border-radius: 14px;
      padding: 22px 20px;
      text-align: center;
    }
    .err-icon { font-size: 28px; margin-bottom: 10px; }
    .err-txt { font-size: 14px; color: #ff8888; line-height: 1.5; margin-bottom: 16px; }
    .btn-retry {
      padding: 12px 28px;
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border2); border-radius: 10px;
      font-family: var(--ui); font-size: 15px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase;
      cursor: pointer;
    }

    /* ─── TOAST ──────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 12px) + 20px);
      left: 50%; transform: translateX(-50%) translateY(70px);
      background: var(--accent); color: #000;
      padding: 11px 22px; border-radius: 100px;
      font-family: var(--ui); font-size: 14px; font-weight: 700;
      letter-spacing: .05em;
      transition: transform .4s cubic-bezier(.34,1.56,.64,1);
      z-index: 9999; white-space: nowrap; pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="hd">
  <div class="hd-icon">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 4h2M4 8h2M4 12h2M4 16h2M4 20h2M8 4h1M8 8h1M8 12h1M8 16h1M8 20h1M11 4h2M14 4h2M17 4h3M11 8h6M20 8v2M11 12h2M14 12h3M20 12v8M14 16h6"/>
    </svg>
  </div>
  <div>
    <div class="hd-title">Scanner Livres</div>
    <div class="hd-sub">ISBN → Bibliothèque de Lausanne</div>
  </div>
</div>

<!-- ISBN BANNER PERMANENT -->
<div class="isbn-bar">
  <span class="isbn-tag">ISBN</span>
  <div class="isbn-led" id="led"></div>
  <span class="isbn-val empty" id="isbnVal">— — — — — — — — — — — — —</span>
</div>

<!-- BODY -->
<div class="body">

  <!-- VIEWPORT -->
  <div id="vwrap">
    <div id="viewport"></div>
    <div class="ov">
      <div class="corner c-tl"></div>
      <div class="corner c-tr"></div>
      <div class="corner c-bl"></div>
      <div class="corner c-br"></div>
      <div class="scan-beam" id="beam"></div>
      <div class="timer-wrap">
        <svg width="54" height="54" viewBox="0 0 54 54">
          <circle class="t-track" cx="27" cy="27" r="24"/>
          <circle class="t-prog" id="tprog" cx="27" cy="27" r="24"/>
        </svg>
        <div class="t-num" id="tnum">8</div>
      </div>
    </div>
  </div>

  <!-- IDLE -->
  <div id="idle">
    <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
      <rect x="8" y="16" width="56" height="40" rx="4" stroke="#444" stroke-width="1.5"/>
      <line x1="19" y1="16" x2="19" y2="56" stroke="#444" stroke-width="4"/>
      <line x1="27" y1="16" x2="27" y2="56" stroke="#444" stroke-width="1.5"/>
      <line x1="33" y1="16" x2="33" y2="56" stroke="#333" stroke-width="3"/>
      <line x1="40" y1="16" x2="40" y2="56" stroke="#444" stroke-width="1.5"/>
      <line x1="46" y1="16" x2="46" y2="56" stroke="#444" stroke-width="2.5"/>
      <line x1="52" y1="16" x2="52" y2="56" stroke="#444" stroke-width="1.5"/>
      <line x1="8" y1="63" x2="64" y2="63" stroke="#00e87a" stroke-width="2" opacity=".45"/>
    </svg>
    <div class="idle-txt">Prêt à scanner</div>
  </div>

  <!-- CONTROLS -->
  <div class="ctrl">
    <button class="btn btn-primary" id="btnStart" onclick="startScan()">📷 &nbsp;Scanner un livre</button>
    <button class="btn btn-cancel" id="btnCancel" onclick="cancelScan()">✕ &nbsp;Annuler</button>
  </div>

  <div class="status muted" id="status">Pointez la caméra vers le code-barres ISBN du livre</div>

  <!-- LOADER -->
  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-txt">Recherche en cours…</div>
  </div>

  <!-- RESULT -->
  <div id="result">
    <div class="r-top">
      <img class="r-cover" id="rCover" src="" alt="Couverture"
        onerror="this.style.display='none';document.getElementById('rCoverPh').style.display='flex';">
      <div class="r-cover-ph" id="rCoverPh">
        <svg width="28" height="28" fill="#444" viewBox="0 0 24 24">
          <path d="M6 2h12a2 2 0 012 2v16a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2zm0 2v16h12V4H6zm2 2h8v2H8V6zm0 4h6v2H8v-2z"/>
        </svg>
      </div>
      <div class="r-info">
        <div class="r-title" id="rTitle"></div>
        <div class="r-author" id="rAuthor"></div>
        <div class="r-meta" id="rMeta"></div>
        <div class="r-src" id="rSrc"><div class="r-src-dot"></div><span id="rSrcTxt"></span></div>
      </div>
    </div>
    <div class="r-div"></div>
    <div class="r-summary collapsed" id="rSummary"></div>
    <div class="r-more" id="rMore" onclick="toggleSummary()">▼ Voir le résumé complet</div>
    <div class="r-actions">
      <button class="btn-add" id="btnAdd" onclick="addToLibrary()">
        <svg width="16" height="16" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        Ajouter à ma bibliothèque
      </button>
      <button class="btn-again" onclick="resetScanner()" title="Nouveau scan">↺</button>
    </div>
  </div>

  <!-- ERROR -->
  <div id="errcard">
    <div class="err-icon">⚠️</div>
    <div class="err-txt" id="errTxt"></div>
    <button class="btn-retry" onclick="resetScanner()">Réessayer</button>
  </div>

</div><!-- /.body -->

<div class="toast" id="toast"></div>

<!-- Quagga -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<script>
/* ─────────────────────────────────────────────────────────
   CONFIG
───────────────────────────────────────────────────────── */
const LIBRARY_URL   = 'https://marcel6311.github.io/Biblioth%C3%A8que/ma-bibliotheque.html';
const SCAN_DURATION = 8; // secondes
const CIRC          = 2 * Math.PI * 24; // ≈ 150.796

/* ─── STATE ──────────────────────────────────────────── */
let scanning      = false;
let quaggaLive    = false;
let scanTimer     = null;
let tickInterval  = null;
let currentISBN   = '';
let currentBook   = null;
let summaryOpen   = false;

/* ─── TIMER UI ───────────────────────────────────────── */
function startTimer() {
  let s = SCAN_DURATION;
  const prog = document.getElementById('tprog');
  const num  = document.getElementById('tnum');
  prog.style.stroke = 'var(--accent)';
  prog.style.strokeDashoffset = '0';
  num.textContent = s;

  tickInterval = setInterval(() => {
    s--;
    num.textContent = s;
    prog.style.strokeDashoffset = CIRC * (1 - s / SCAN_DURATION);
    if (s <= 3) prog.style.stroke = 'var(--red)';
    if (s <= 0) clearInterval(tickInterval);
  }, 1000);
}

function stopTimer() {
  clearInterval(tickInterval);
  tickInterval = null;
}

/* ─── SCAN ───────────────────────────────────────────── */
function startScan() {
  resetUI();
  scanning = true;

  document.getElementById('vwrap').style.display    = 'block';
  document.getElementById('idle').style.display     = 'none';
  document.getElementById('btnStart').style.display = 'none';
  document.getElementById('btnCancel').style.display = 'block';
  document.getElementById('led').classList.add('on');
  setStatus('Scan en cours… pointez vers le code-barres', 'scanning');
  startTimer();

  scanTimer = setTimeout(() => {
    if (scanning && !currentISBN) {
      stopScan();
      setStatus('Aucun code-barres détecté — réessayez', 'timeout');
      document.getElementById('idle').style.display = 'flex';
      document.getElementById('btnStart').style.display = 'block';
    }
  }, SCAN_DURATION * 1000);

  Quagga.init({
    inputStream: {
      type: 'LiveStream',
      target: document.getElementById('viewport'),
      constraints: {
        facingMode: 'environment',
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    },
    locator: { patchSize: 'medium', halfSample: true },
    numOfWorkers: 2,
    frequency: 10,
    decoder: { readers: ['ean_reader', 'ean_8_reader'] },
    locate: true
  }, err => {
    if (err) {
      stopScan();
      showError("Impossible d'accéder à la caméra.\nVérifiez les autorisations dans Réglages > Safari.");
      return;
    }
    quaggaLive = true;
    Quagga.start();
  });

  Quagga.onDetected(onDetected);
}

function onDetected(result) {
  if (!scanning) return;
  const code = result.codeResult.code;
  if (!code || code.length < 10) return;
  // Validate EAN-13 / ISBN-10 checksum loosely
  stopScan();
  setISBN(code);
  fetchBook(code);
}

function stopScan() {
  scanning = false;
  clearTimeout(scanTimer);
  stopTimer();
  document.getElementById('led').classList.remove('on');
  document.getElementById('btnCancel').style.display = 'none';
  document.getElementById('beam').classList.add('paused');
  if (quaggaLive) {
    try { Quagga.offDetected(onDetected); Quagga.stop(); } catch(e){}
    quaggaLive = false;
  }
  setTimeout(() => { document.getElementById('vwrap').style.display = 'none'; }, 250);
}

function cancelScan() {
  stopScan();
  resetScanner();
}

/* ─── ISBN DISPLAY ───────────────────────────────────── */
function setISBN(isbn) {
  currentISBN = isbn;
  const el = document.getElementById('isbnVal');
  el.textContent = isbn;
  el.classList.remove('empty');
}

function clearISBN() {
  currentISBN = '';
  const el = document.getElementById('isbnVal');
  el.textContent = '— — — — — — — — — — — — —';
  el.classList.add('empty');
}

/* ─── API CASCADE ────────────────────────────────────── */
async function fetchBook(isbn) {
  setStatus('', '');
  showLoader(true);

  /* 1. Google Books */
  try {
    const book = await fetchGoogle(isbn);
    if (book) { currentBook = book; showResult(book); return; }
  } catch(e) { console.warn('Google Books:', e); }

  /* 2. Open Library */
  try {
    const book = await fetchOpenLib(isbn);
    if (book) { currentBook = book; showResult(book); return; }
  } catch(e) { console.warn('Open Library:', e); }

  showLoader(false);
  showError(`Aucun livre trouvé pour l'ISBN ${isbn}.\nVérifiez que c'est bien un code-barres de livre.`);
}

async function fetchGoogle(isbn) {
  const r = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
  if (!r.ok) return null;
  const d = await r.json();
  if (!d.items?.length) return null;
  const v = d.items[0].volumeInfo;
  return {
    title:     v.title || 'Titre inconnu',
    author:    (v.authors || ['Auteur inconnu']).join(', '),
    publisher: v.publisher || '',
    year:      v.publishedDate?.substring(0,4) || '',
    pages:     v.pageCount || '',
    lang:      v.language || '',
    summary:   v.description || '',
    cover:     (v.imageLinks?.thumbnail || v.imageLinks?.smallThumbnail || '').replace('http:','https:'),
    isbn,
    source: 'Google Books'
  };
}

async function fetchOpenLib(isbn) {
  const r = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
  if (!r.ok) return null;
  const d = await r.json();
  const info = d[`ISBN:${isbn}`];
  if (!info) return null;
  const cover   = info.cover?.large || info.cover?.medium || info.cover?.small || '';
  const summary = typeof info.notes === 'string' ? info.notes
                : info.notes?.value || info.excerpts?.[0]?.text || '';
  return {
    title:     info.title || 'Titre inconnu',
    author:    (info.authors||[]).map(a=>a.name).join(', ') || 'Auteur inconnu',
    publisher: (info.publishers||[]).map(p=>p.name).join(', '),
    year:      info.publish_date?.match(/\d{4}/)?.[0] || '',
    pages:     info.number_of_pages || '',
    lang:      '',
    summary,
    cover,
    isbn,
    source: 'Open Library'
  };
}

/* ─── UI STATES ──────────────────────────────────────── */
function showLoader(on) {
  document.getElementById('loader').style.display   = on ? 'flex' : 'none';
  document.getElementById('result').style.display   = 'none';
  document.getElementById('errcard').style.display  = 'none';
  document.getElementById('idle').style.display     = 'none';
  if (!on) document.getElementById('btnStart').style.display = 'block';
}

function showResult(b) {
  showLoader(false);

  document.getElementById('rTitle').textContent  = b.title;
  document.getElementById('rAuthor').textContent = b.author;

  const parts = [];
  if (b.year) parts.push(b.year);
  if (b.pages) parts.push(b.pages + ' p.');
  if (b.publisher) parts.push(b.publisher);
  document.getElementById('rMeta').textContent   = parts.join(' · ');
  document.getElementById('rSrcTxt').textContent = b.source;

  const img = document.getElementById('rCover');
  const ph  = document.getElementById('rCoverPh');
  if (b.cover) {
    img.src = b.cover;
    img.style.display = 'block';
    ph.style.display  = 'none';
  } else {
    img.style.display = 'none';
    ph.style.display  = 'flex';
  }

  const sumEl   = document.getElementById('rSummary');
  const moreEl  = document.getElementById('rMore');
  summaryOpen   = false;
  if (b.summary) {
    sumEl.textContent = b.summary;
    sumEl.classList.add('collapsed');
    moreEl.style.display = 'block';
    moreEl.textContent   = '▼ Voir le résumé complet';
  } else {
    sumEl.textContent    = 'Aucun résumé disponible pour ce livre.';
    sumEl.classList.remove('collapsed');
    moreEl.style.display = 'none';
  }

  const btnAdd = document.getElementById('btnAdd');
  btnAdd.classList.remove('done');
  btnAdd.innerHTML = '<svg width="16" height="16" fill="none" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg> Ajouter à ma bibliothèque';

  document.getElementById('result').style.display   = 'block';
  document.getElementById('btnStart').style.display = 'block';
}

function showError(msg) {
  document.getElementById('errTxt').textContent     = msg.replace(/\\n/g,'\n');
  document.getElementById('errcard').style.display  = 'block';
  document.getElementById('idle').style.display     = 'none';
  document.getElementById('btnStart').style.display = 'block';
}

function setStatus(msg, cls) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className   = 'status ' + (cls || 'muted');
}

/* ─── SUMMARY TOGGLE ─────────────────────────────────── */
function toggleSummary() {
  summaryOpen = !summaryOpen;
  const s = document.getElementById('rSummary');
  const m = document.getElementById('rMore');
  if (summaryOpen) {
    s.classList.remove('collapsed');
    m.textContent = '▲ Réduire';
  } else {
    s.classList.add('collapsed');
    m.textContent = '▼ Voir le résumé complet';
  }
}

/* ─── ADD TO LIBRARY ─────────────────────────────────── */
function addToLibrary() {
  if (!currentBook) return;

  const entry = {
    id:          Date.now(),
    title:       currentBook.title,
    author:      currentBook.author,
    isbn:        currentBook.isbn,
    description: currentBook.summary,
    cover:       currentBook.cover,
    publisher:   currentBook.publisher,
    year:        currentBook.year,
    pages:       currentBook.pages,
    status:      'à lire',
    dateAdded:   new Date().toISOString(),
    returnDate:  null,
    notes:       ''
  };

  try {
    const books = JSON.parse(localStorage.getItem('bib_books_v4') || '[]');
    if (books.some(b => b.isbn && b.isbn === currentBook.isbn)) {
      showToast('📚 Déjà dans votre bibliothèque');
      return;
    }
    books.push(entry);
    localStorage.setItem('bib_books_v4', JSON.stringify(books));

    const btn = document.getElementById('btnAdd');
    btn.classList.add('done');
    btn.innerHTML = '✓ &nbsp;Ajouté !';
    showToast('✓ Livre ajouté avec succès');

    setTimeout(() => {
      if (confirm(`"${currentBook.title}" a été ajouté à votre bibliothèque.\n\nOuvrir ma bibliothèque ?`)) {
        window.location.href = LIBRARY_URL;
      }
    }, 900);

  } catch(e) {
    showToast('⚠️ Erreur lors de l\'ajout');
    console.error(e);
  }
}

/* ─── TOAST ──────────────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

/* ─── RESET ──────────────────────────────────────────── */
function resetUI() {
  document.getElementById('result').style.display  = 'none';
  document.getElementById('errcard').style.display = 'none';
  document.getElementById('loader').style.display  = 'none';
  document.getElementById('beam').classList.remove('paused');
  document.getElementById('tprog').style.stroke = 'var(--accent)';
  currentBook = null;
}

function resetScanner() {
  resetUI();
  clearISBN();
  document.getElementById('vwrap').style.display     = 'none';
  document.getElementById('idle').style.display      = 'flex';
  document.getElementById('btnStart').style.display  = 'block';
  document.getElementById('btnCancel').style.display = 'none';
  setStatus('Pointez la caméra vers le code-barres ISBN du livre', 'muted');
}

/* ─── INIT ───────────────────────────────────────────── */
resetScanner();
</script>
